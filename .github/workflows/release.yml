name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build Notty
        run: make all

      - name: Create .dmg
        run: make dmg
        env:
          DYLD_LIBRARY_PATH: ""

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Notty.dmg
          generate_release_notes: true
